    <script>
        const firebaseConfig = {
            projectId: "museum-des-gemeinsinns",
            databaseURL: "https://museum-des-gemeinsinns-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let 현재작품 = '기억의 지속';
        let 서버공통감데이터 = [];

        function openMuseumModal(title) {
            현재작품 = title;
            document.getElementById('modalTitle').innerText = `『${title}』에 대한 솔직한 느낌`;
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('matchBox').innerHTML = `의견을 입력하시면 <span class="match-highlight">칸트의 공통감(Gemeinsinn)</span> 공간에 단어가 기록됩니다.`;
            document.getElementById('chatInput').value = "";
            document.getElementById('bubbleSpace').innerHTML = ""; 

            const artworkRef = database.ref('artwork_emotions/' + 현재작품);
            artworkRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    서버공통감데이터 = Object.values(data);
                } else {
                    서버공통감데이터 = [];
                }
            });
        }

        function closeMuseumModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            database.ref('artwork_emotions/' + 현재작품).off();
        }

        function createBubbleElement(text) {
            const space = document.getElementById('bubbleSpace');
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = text;

            const randomLeft = 5 + Math.random() * 60; 
            const randomXMove = (Math.random() * 40 - 20) + "px"; 

            bubble.style.left = `${randomLeft}%`;
            bubble.style.setProperty('--random-x', randomXMove);

            space.appendChild(bubble);
            
            setTimeout(() => { bubble.remove(); }, 9000);
        }

        function addNewBubble() {
            const input = document.getElementById('chatInput');
            const userText = input.value.trim();
            
            if(userText === "") return;

            // 🔥 [개선] 최우선 순위: 무조건 말풍선부터 화면에 즉시 띄우고 입력창 비우기!
            createBubbleElement(userText);
            input.value = ""; 

            // 그 이후에 무거운 연산 및 서버 통신을 백그라운드에서 처리 (비동기 체감 최적화)
            setTimeout(() => {
                const 현재단어들 = userText.split(" ")
                                          .map(w => w.substring(0, 3)) 
                                          .filter(w => w.length >= 1);

                let 동일감정인원수 = 0;

                서버공통감데이터.forEach(pastText => {
                    let matchFound = false;
                    const 과거단어들 = pastText.split(" ").map(w => w.substring(0, 3)).filter(w => w.length >= 1);

                    현재단어들.forEach(curW => {
                        if(pastText.includes(curW)) matchFound = true;
                    });
                    과거단어들.forEach(pastW => {
                        if(userText.includes(pastW)) matchFound = true;
                    });

                    if(matchFound) 동일감정인원수++;
                });

                // 파이어베이스 데이터 업로드
                database.ref('artwork_emotions/' + 현재작품).push(userText);
                
                동일감정인원수 += 1;

                // 카운팅 텍스트 반영
                const matchBox = document.getElementById('matchBox');
                matchBox.innerHTML = `현재까지 당신과 유사한 느낌을 공유한 사람은 <span class="match-highlight">총 ${동일감정인원수}명</span>입니다.`;
            }, 0);
        }

        function handleKeyPress(e) {
            if(e.key === 'Enter') {
                addNewBubble();
            }
        }
    </script>
